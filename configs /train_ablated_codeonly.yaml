### model
model_name_or_path: /mnt/workspace/modelscope_cache/Qwen/Qwen2___5-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

### dataset
dataset: train_ablated_codeonly
dataset_dir: /mnt/workspace/LlamaFactory/data
template: qwen
cutoff_len: 2048
max_samples: 3405
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: /mnt/workspace/LlamaFactory/saves/qwen2.5-7b/lora/train_ablated_codeonly
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### eval
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200

